<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mine Game</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --bg: #0f172a;
      --card: #111827;
      --card2: #1f2937;
      --text: #f8fafc;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --good: #22c55e;
      --bad: #ef4444;
      --warn: #f59e0b;
      --border: rgba(255,255,255,0.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, system-ui, Arial, sans-serif;
      background: linear-gradient(180deg, #020617, #0f172a 40%, #111827);
      color: var(--text);
      min-height: 100vh;
    }
    .wrap {
      width: min(100%, 820px);
      margin: 0 auto;
      padding: 16px 14px 28px;
    }
    .hero, .card {
      background: rgba(17,24,39,0.86);
      backdrop-filter: blur(10px);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.22);
    }
    .hero { padding: 18px; }
    .title { font-size: 24px; font-weight: 800; margin: 0 0 6px; }
    .sub { color: var(--muted); font-size: 14px; }
    .grid2 {
      display: grid;
      grid-template-columns: repeat(2, minmax(0,1fr));
      gap: 12px;
      margin-top: 12px;
    }
    .stat {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 12px;
    }
    .stat .k { color: var(--muted); font-size: 12px; }
    .stat .v { margin-top: 4px; font-size: 18px; font-weight: 700; }
    .section { margin-top: 14px; }
    .card { padding: 16px; }
    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 6px; }
    input, select, button {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px 13px;
      background: #0b1220;
      color: var(--text);
      font-size: 15px;
    }
    button { cursor: pointer; font-weight: 700; }
    .primary { background: linear-gradient(135deg, #0284c7, #2563eb); }
    .good { background: linear-gradient(135deg, #16a34a, #22c55e); }
    .danger { background: linear-gradient(135deg, #dc2626, #ef4444); }
    .mutedBtn { background: #172033; }
    .board {
      display: grid;
      gap: 8px;
      margin-top: 14px;
    }
    .tile {
      aspect-ratio: 1;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: linear-gradient(180deg, #1e293b, #0f172a);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      font-weight: 800;
      user-select: none;
      transition: transform .12s ease, opacity .12s ease, background .2s ease;
    }
    .tile.hidden { cursor: pointer; }
    .tile.hidden:active { transform: scale(0.97); }
    .tile.gem { background: linear-gradient(180deg, #14532d, #166534); }
    .tile.mine { background: linear-gradient(180deg, #7f1d1d, #991b1b); }
    .toolbar {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      margin-top: 12px;
    }
    .notice {
      margin-top: 12px;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.04);
      color: #e2e8f0;
      font-size: 14px;
      white-space: pre-wrap;
    }
    .notice.goodBg { border-color: rgba(34,197,94,0.35); background: rgba(34,197,94,0.10); }
    .notice.badBg { border-color: rgba(239,68,68,0.35); background: rgba(239,68,68,0.10); }
    .pillRow { display:flex; gap:8px; flex-wrap: wrap; margin-top: 12px; }
    .pill { padding: 8px 10px; border-radius: 999px; background: rgba(255,255,255,0.05); border:1px solid var(--border); font-size: 12px; color: var(--muted); }
    .footer { color: var(--muted); text-align:center; margin-top: 18px; font-size: 12px; }
    @media (max-width: 640px) {
      .controls, .grid2, .toolbar { grid-template-columns: 1fr; }
      .title { font-size: 21px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <div class="title">💣 Mine Game Mini App</div>
      <div class="sub">Play directly inside Telegram with your real bot balance.</div>
      <div class="grid2">
        <div class="stat"><div class="k">Main Balance</div><div class="v" id="mainBalance">₹0.00</div></div>
        <div class="stat"><div class="k">Referrals</div><div class="v" id="referrals">0</div></div>
        <div class="stat"><div class="k">Multiplier</div><div class="v" id="multiplier">x1.00</div></div>
        <div class="stat"><div class="k">Cash Out Value</div><div class="v" id="cashoutValue">₹0.00</div></div>
      </div>
      <div class="pillRow">
        <div class="pill" id="riskPill">Risk: —</div>
        <div class="pill" id="modePill">Mode: Telegram Mini App</div>
        <div class="pill" id="statusPill">Status: Idle</div>
      </div>
    </div>

    <div class="section card">
      <div class="controls">
        <div>
          <label for="minesCount">💣 Mines</label>
          <input id="minesCount" type="number" min="1" value="3" />
        </div>
        <div>
          <label for="betAmount">💰 Bet Amount</label>
          <input id="betAmount" type="number" step="0.01" min="1" value="10" />
        </div>
        <div>
          <label for="sourceBalance">🏦 Balance Source</label>
          <select id="sourceBalance">
            <option value="main">Main Balance</option>
            <option value="referral">Referral Balance</option>
            <option value="daily_bonus">Daily Bonus Balance</option>
            <option value="gift">Gift Balance</option>
          </select>
        </div>
        <div>
          <label>&nbsp;</label>
          <button class="primary" id="startBtn">🚀 Start Game</button>
        </div>
      </div>
      <div class="notice" id="notice">Loading Mine Game…</div>
      <div class="board" id="board"></div>
      <div class="toolbar">
        <button class="good" id="cashoutBtn" disabled>💰 Cash Out</button>
        <button class="danger" id="endBtn" disabled>🛑 End Game</button>
        <button class="mutedBtn" id="refreshBtn">🔄 Refresh</button>
      </div>
    </div>

    <div class="footer">Open this from the Telegram bot for the smoothest Mini App experience.</div>
  </div>

  <script>
    const tg = window.Telegram?.WebApp;
    if (tg) {
      tg.ready();
      tg.expand();
      tg.setHeaderColor('#0f172a');
      tg.setBackgroundColor('#020617');
    }

    const qsUid = Number(new URLSearchParams(location.search).get('uid') || 0);
    const tgUid = Number(tg?.initDataUnsafe?.user?.id || 0);
    const userId = qsUid || tgUid;
    const API = '{{ api_base }}';
    let currentSession = null;
    let currentSettings = null;

    const $ = (id) => document.getElementById(id);
    const noticeEl = $('notice');
    const boardEl = $('board');

    function setNotice(msg, kind='') {
      noticeEl.textContent = msg;
      noticeEl.className = 'notice' + (kind === 'good' ? ' goodBg' : kind === 'bad' ? ' badBg' : '');
    }

    function setBalances(user) {
      $('mainBalance').textContent = `₹${Number(user.balance || 0).toFixed(2)}`;
      $('referrals').textContent = String(user.referrals || 0);
    }

    function setWallets(wallets) {
      const source = $('sourceBalance').value;
      const amount = Number(wallets?.[source === 'daily_bonus' ? 'daily_bonus' : source] || 0).toFixed(2);
      $('statusPill').textContent = `Selected Wallet: ₹${amount}`;
    }

    function renderSession(session) {
      currentSession = session || null;
      const hasSession = !!session;
      $('cashoutBtn').disabled = !hasSession || session.status !== 'active' || Number(session.gems_found || 0) <= 0;
      $('endBtn').disabled = !hasSession || session.status !== 'active';
      $('multiplier').textContent = `x${Number(session?.multiplier || 1).toFixed(2)}`;
      $('cashoutValue').textContent = `₹${Number(session?.cashout_value || 0).toFixed(2)}`;
      $('riskPill').textContent = `Risk: ${session?.risk_percent == null ? '—' : session.risk_percent + '%'}`;
      $('statusPill').textContent = `Status: ${hasSession ? session.status : 'Idle'}`;
      boardEl.innerHTML = '';
      if (!hasSession) {
        boardEl.style.gridTemplateColumns = 'repeat(5, 1fr)';
        return;
      }
      const size = Number(session.grid_size || 5);
      boardEl.style.gridTemplateColumns = `repeat(${size}, 1fr)`;
      (session.board || []).forEach((cell, index) => {
        const btn = document.createElement('button');
        btn.className = `tile ${cell}`;
        btn.disabled = session.status !== 'active' || cell !== 'hidden';
        btn.textContent = cell === 'hidden' ? '❔' : cell === 'gem' ? '💎' : cell === 'mine' ? '💣' : '⬜';
        btn.onclick = () => pickTile(index);
        boardEl.appendChild(btn);
      });
    }

    async function api(path, options = {}) {
      const res = await fetch(`${API}${path}`, {
        headers: { 'Content-Type': 'application/json' },
        ...options,
      });
      const data = await res.json();
      if (!data.ok) throw new Error(data.message || 'Request failed');
      return data;
    }

    async function bootstrap() {
      if (!userId) {
        setNotice('Open this page from the Telegram bot so your user account can be detected.', 'bad');
        return;
      }
      try {
        const data = await api(`/bootstrap?uid=${encodeURIComponent(userId)}`, { method: 'GET' });
        currentSettings = data.settings;
        setBalances(data.user);
        setWallets(data.user.wallets || {});
        $('minesCount').min = data.settings.min_mines;
        $('minesCount').max = data.settings.max_mines;
        $('minesCount').value = Math.min(Math.max(Number($('minesCount').value || 3), data.settings.min_mines), data.settings.max_mines);
        $('betAmount').min = data.settings.min_bet;
        $('betAmount').max = data.settings.max_bet;
        if (!data.access.allowed) {
          setNotice(data.access.message, 'bad');
        } else if (data.session) {
          setNotice('Active game restored. You can continue playing or cash out.', 'good');
        } else {
          setNotice('Ready to play. Choose mines, bet, and balance source.', '');
        }
        renderSession(data.session);
      } catch (err) {
        setNotice(err.message || 'Unable to load Mine Game.', 'bad');
      }
    }

    async function startGame() {
      try {
        setNotice('Starting Mine Game…');
        const data = await api('/start', {
          method: 'POST',
          body: JSON.stringify({
            user_id: userId,
            mines_count: Number($('minesCount').value || 0),
            bet_amount: Number($('betAmount').value || 0),
            source_balance: $('sourceBalance').value,
          })
        });
        renderSession(data.session);
        setNotice(data.resumed ? 'Active game restored.' : 'Game started. Pick a tile.', 'good');
      } catch (err) {
        setNotice(err.message, 'bad');
      }
    }

    async function pickTile(index) {
      if (!currentSession || currentSession.status !== 'active') return;
      try {
        const data = await api('/pick', {
          method: 'POST',
          body: JSON.stringify({ user_id: userId, session_id: currentSession.id, index })
        });
        renderSession(data.session);
        setNotice(data.message || 'Tile opened.', data.event === 'mine' ? 'bad' : 'good');
        if (data.event === 'cashout' && tg?.HapticFeedback?.notificationOccurred) tg.HapticFeedback.notificationOccurred('success');
      } catch (err) {
        setNotice(err.message, 'bad');
      }
    }

    async function cashout() {
      if (!currentSession) return;
      try {
        const data = await api('/cashout', {
          method: 'POST',
          body: JSON.stringify({ user_id: userId, session_id: currentSession.id })
        });
        renderSession(data.session);
        setNotice(`Cashout complete. Net ₹${Number(data.payout?.net || 0).toFixed(2)}`, 'good');
      } catch (err) {
        setNotice(err.message, 'bad');
      }
    }

    async function endGame() {
      if (!currentSession) return;
      try {
        const data = await api('/end', {
          method: 'POST',
          body: JSON.stringify({ user_id: userId, session_id: currentSession.id })
        });
        renderSession(data.session);
        setNotice(data.message || 'Game ended.', 'bad');
      } catch (err) {
        setNotice(err.message, 'bad');
      }
    }

    $('startBtn').addEventListener('click', startGame);
    $('cashoutBtn').addEventListener('click', cashout);
    $('endBtn').addEventListener('click', endGame);
    $('refreshBtn').addEventListener('click', bootstrap);
    $('sourceBalance').addEventListener('change', bootstrap);

    bootstrap();
  </script>
</body>
</html>
