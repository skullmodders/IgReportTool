<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Mine Game</title><script src="https://telegram.org/js/telegram-web-app.js"></script><style>body{font-family:Arial,sans-serif;background:#0f1220;color:#fff;margin:0;padding:16px}.card{max-width:720px;margin:0 auto;background:#171b2e;border-radius:16px;padding:16px}.grid{display:grid;gap:8px;margin-top:16px}.tile{aspect-ratio:1/1;border:none;border-radius:12px;background:#232944;color:#fff;font-size:24px}.row{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0}input,select,button{padding:10px;border-radius:10px;border:none}button{background:#5b6cff;color:#fff}.muted{color:#aab}</style></head><body><div class="card"><h2>💣 Mine Game</h2><p class="muted">Play inside Telegram Mini App.</p><div id="setup"><div class="row"><input id="uid" placeholder="User ID" value="{{ user_id }}"/><input id="mines" placeholder="Mines" type="number" min="1"/><input id="bet" placeholder="Bet" type="number" step="0.01" min="1"/></div><div class="row"><select id="source"><option value="main">Main</option><option value="referral">Referral</option><option value="daily_bonus">Daily Bonus</option><option value="gift">Gift</option></select><button onclick="startGame()">Start</button><button onclick="bootstrap()">Refresh</button></div></div><div id="info"></div><div id="actions" class="row" style="display:none"><button onclick="cashout()">Cash Out</button><button onclick="endGame()">End</button></div><div id="grid" class="grid"></div></div><script>const API='{{ api_base }}';let session=null;function setInfo(t){document.getElementById('info').innerHTML=t}function uid(){return parseInt(document.getElementById('uid').value||'0',10)}function render(){const grid=document.getElementById('grid');grid.innerHTML='';if(!session){document.getElementById('actions').style.display='none';return;}document.getElementById('actions').style.display=session.status==='active'?'flex':'none';setInfo(`Status: <b>${session.status}</b><br>Bet: ₹${session.bet_amount}<br>Mines: ${session.mines_count}<br>Gems: ${session.gems_found}<br>Multiplier: x${session.multiplier}<br>Cashout: ₹${session.cashout_value}`);grid.style.gridTemplateColumns=`repeat(${session.grid_size},1fr)`;session.board.forEach((cell,idx)=>{const b=document.createElement('button');b.className='tile';b.textContent=cell==='hidden'?'❔':(cell==='mine'?'💣':(cell==='gem'?'💎':'⬜'));b.disabled=session.status!=='active'||cell!=='hidden';b.onclick=()=>pick(idx);grid.appendChild(b);});}async function bootstrap(){const r=await fetch(`${API}/bootstrap?uid=${uid()}`);const j=await r.json();if(!j.ok){setInfo(j.message);return;}session=j.session||null;render();if(j.access&&!j.access.allowed){setInfo(j.access.message)}}async function startGame(){const payload={user_id:uid(),mines_count:parseInt(document.getElementById('mines').value||'0',10),bet_amount:parseFloat(document.getElementById('bet').value||'0'),source_balance:document.getElementById('source').value};const r=await fetch(`${API}/start`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});const j=await r.json();if(!j.ok){setInfo(j.message);return;}session=j.session;render();}async function pick(index){const r=await fetch(`${API}/pick`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({user_id:uid(),session_id:session.id,index})});const j=await r.json();if(!j.ok){setInfo(j.message);return;}session=j.session;render();}async function cashout(){const r=await fetch(`${API}/cashout`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({user_id:uid(),session_id:session.id})});const j=await r.json();if(!j.ok){setInfo(j.message);return;}session=j.session;render();}async function endGame(){const r=await fetch(`${API}/end`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({user_id:uid(),session_id:session.id})});const j=await r.json();if(!j.ok){setInfo(j.message);return;}session=j.session;render();}bootstrap();</script></body></html>
